<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Safety Measures</title>
</head>
<body>

<h3>Select School Safety Measures:</h3>

<form>
    <input type="checkbox" id="mask" name="school_measures" value="Wearing Mask">
    <label for="mask">Wearing Face Mask</label><br>

    <input type="checkbox" id="handwash" name="school_measures" value="Hand Washing">
    <label for="handwash">Regular Hand Washing</label><br>

    <input type="checkbox" id="sanitize" name="school_measures" value="Sanitizing Stations">
    <label for="sanitize">Sanitizing Stations</label><br>

    <input type="checkbox" id="distance" name="school_measures" value="Social Distancing">
    <label for="distance">Social Distancing</label><br>

    <input type="checkbox" id="temperature" name="school_measures" value="Temperature Check">
    <label for="temperature">Temperature Check at Entrance</label><br>

    <input type="checkbox" id="cleaning" name="school_measures" value="Regular Cleaning">
    <label for="cleaning">Regular Classroom Cleaning</label><br>
</form>

</body>
